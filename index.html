<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pugs' Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo">
    </header>

    <nav>
        <ul>
            <li><a href="#github-repos">Projects</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section id="github-repos">
            <h2>GitHub Repositories</h2>
            <div id="repo-content">Loading...</div>
        </section>

        <section id="about">
            <h2>About Me</h2>
            <p>Developer and electronics tinkerer. Currently working on modular systems and automation.</p>
        </section>

        <section id="contact">
            <h2>Contact Me</h2>
            <form action="#" method="post">
                <label>Name:</label>
                <input type="text" name="name">
                <label>Message:</label>
                <textarea name="message"></textarea><br><br>
                <input type="submit" value="Send Message">
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
